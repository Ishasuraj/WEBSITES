<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Verify OTP • jobSentinel</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    :root {
      --bg-main: linear-gradient(135deg, #020617, #0f172a);
      --card-bg: rgba(30, 41, 59, 0.65);
      --accent: #38bdf8;
      --accent-2: #0ea5e9;
      --success: #22c55e;
      --text-muted: #94a3b8;
      --border: rgba(56, 189, 248, 0.25);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Segoe UI", system-ui, sans-serif;
    }

    body {
      min-height: 100vh;
      background: var(--bg-main);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #e5e7eb;
    }

    .auth-card {
      width: 100%;
      max-width: 420px;
      background: var(--card-bg);
      padding: 42px;
      border-radius: 16px;
      border: 1px solid var(--border);
      box-shadow: 0 25px 60px rgba(0, 0, 0, 0.45);
      text-align: center;
    }

    h2 {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 10px;
      background: linear-gradient(135deg, var(--accent), #22d3ee);
      background-clip: text;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .subtitle {
      font-size: 15px;
      color: var(--text-muted);
      margin-bottom: 28px;
      line-height: 1.5;
    }

    .otp-inputs {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 26px;
    }

    .otp-inputs input {
      width: 48px;
      height: 54px;
      text-align: center;
      font-size: 20px;
      font-weight: 600;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: rgba(2, 6, 23, 0.7);
      color: #e5e7eb;
      outline: none;
    }

    .otp-inputs input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 12px rgba(56, 189, 248, 0.5);
    }

    .btn-primary {
      width: 100%;
      padding: 14px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      font-size: 16px;
      font-weight: 600;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      color: #020617;
      transition: all 0.25s ease;
      margin-bottom: 18px;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 30px rgba(56, 189, 248, 0.5);
    }

    .success-message {
      display: none;
      color: var(--success);
      font-weight: 600;
      margin-top: 16px;
      animation: fadeIn 0.4s ease-in-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(5px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .links {
      font-size: 14px;
      color: var(--text-muted);
      margin-top: 16px;
    }

    .links a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 500;
    }

    .links a:hover {
      text-decoration: underline;
    }
  </style>
</head>

<body>

  <div class="auth-card">
    <h2>Verify OTP</h2>
    <p class="subtitle">
      Enter the 6-digit code sent to your email to continue.
    </p>

    <form onsubmit="verifyOTP(event)">
      <div class="otp-inputs">
        <input type="text" maxlength="1" required />
        <input type="text" maxlength="1" required />
        <input type="text" maxlength="1" required />
        <input type="text" maxlength="1" required />
        <input type="text" maxlength="1" required />
        <input type="text" maxlength="1" required />
      </div>

      <button class="btn-primary">Verify OTP</button>
    </form>

    <div class="success-message" id="successMsg">
      ✅ OTP Verified Successfully! Redirecting…
    </div>

    <div class="links">
      Didn’t receive the code?
      <a href="#">Resend OTP</a><br /><br />
      <a href="login.html">Back to Login</a>
    </div>
  </div>

  <script>
    const inputs = document.querySelectorAll(".otp-inputs input");

    inputs.forEach((input, index) => {
      input.addEventListener("input", () => {
        if (input.value && index < inputs.length - 1) {
          inputs[index + 1].focus();
        }
      });

      input.addEventListener("keydown", (e) => {
        if (e.key === "Backspace" && !input.value && index > 0) {
          inputs[index - 1].focus();
        }
      });
    });

    function verifyOTP(e) {
      e.preventDefault();

      // Simulated OTP validation success
      document.getElementById("successMsg").style.display = "block";

      setTimeout(() => {
        window.location.href = "reset-password.html";
      }, 2000);
    }
  </script>

</body>
</html>
